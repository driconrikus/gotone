name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - run: go build -o /dev/null .

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - run: sudo apt-get update && sudo apt-get install -y portaudio19-dev
      - run: go build -o /dev/null .

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - run: vcpkg install portaudio:x64-windows
        shell: bash
      - run: |
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 \
            CGO_CFLAGS="-I${VCPKG_ROOT}/installed/x64-windows/include" \
            CGO_LDFLAGS="-L${VCPKG_ROOT}/installed/x64-windows/lib" \
            go build -o /dev/null .
        shell: bash
