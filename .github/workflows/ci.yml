name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
      - run: brew install portaudio
      - run: go build -o /dev/null .
        env:
          PKG_CONFIG_PATH: /opt/homebrew/lib/pkgconfig

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
      - run: sudo apt-get update && sudo apt-get install -y portaudio19-dev
      - run: go build -o /dev/null .

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
      - run: vcpkg install portaudio:x64-windows
        shell: bash
      - run: |
          WINHOME=$(cygpath -w "$HOME")
          BINDIR="$WINHOME/.local/bin"
          mkdir -p "$BINDIR"
          cat > "$BINDIR/pkg-config.bat" << 'BAT'
          @echo off
          if /i "%~1"=="--cflags" (echo -I%VCPKG_ROOT%/installed/x64-windows/include & exit /b 0)
          if /i "%~1"=="--libs" (echo -L%VCPKG_ROOT%/installed/x64-windows/lib -lportaudio & exit /b 0)
          exit /b 0
          BAT
          export PATH="$BINDIR:$PATH"
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 \
            PKG_CONFIG="$BINDIR/pkg-config.bat" \
            CGO_CFLAGS="-I${VCPKG_ROOT}/installed/x64-windows/include" \
            CGO_LDFLAGS="-L${VCPKG_ROOT}/installed/x64-windows/lib" \
            go build -o /dev/null .
        shell: bash
