name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      matrix:
        arch: [arm64, amd64]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'

      - name: Install portaudio (native)
        if: matrix.arch == 'arm64'
        run: brew install portaudio

      - name: Build portaudio (x86_64 cross)
        if: matrix.arch == 'amd64'
        run: |
          git clone --depth 1 https://github.com/PortAudio/portaudio.git /tmp/portaudio
          cd /tmp/portaudio
          mkdir -p /tmp/portaudio-x86_64
          ./configure --host=x86_64-apple-darwin \
            CC="cc -arch x86_64" \
            CFLAGS="-arch x86_64" \
            LDFLAGS="-arch x86_64" \
            --prefix=/tmp/portaudio-x86_64
          make -j$(nproc)
          make install

      - name: Build
        run: |
          mkdir -p dist
          binary="gotone-darwin-${{ matrix.arch }}"
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            export PKG_CONFIG_PATH=/tmp/portaudio-x86_64/lib/pkgconfig
            export CC="cc -arch x86_64"
          else
            export PKG_CONFIG_PATH=/opt/homebrew/lib/pkgconfig
          fi
          CGO_ENABLED=1 GOOS=darwin GOARCH=${{ matrix.arch }} \
            go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o "dist/${binary}" .

      - uses: actions/upload-artifact@v4
        with:
          name: gotone-darwin-${{ matrix.arch }}
          path: dist/

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'

      - name: Install portaudio
        run: sudo apt-get update && sudo apt-get install -y portaudio19-dev gcc-aarch64-linux-gnu

      - name: Install arm64 cross dependencies
        if: matrix.arch == 'arm64'
        run: |
          SYSROOT=/usr/aarch64-linux-gnu
          sudo mkdir -p "$SYSROOT"
          cd /tmp

          # Download Packages index from ports.ubuntu.com (avoids apt source manipulation)
          codename=$(grep UBUNTU_CODENAME /etc/os-release | cut -d= -f2)
          UBUNTU_PORTS="https://us.ports.ubuntu.com/ubuntu-ports"
          for comp in main universe; do
            wget -qO- "${UBUNTU_PORTS}/dists/${codename}/${comp}/binary-arm64/Packages.xz" | xz -d
          done > /tmp/Packages

          get_url() { awk -v pkg="$1" '/^Package: /{p=$2} /^Filename: /{if(p==pkg){print $2; exit}}' /tmp/Packages; }

          # Download only ALSA debs (no JACK — portaudio built without it)
          mkdir -p /tmp/debs
          for pkg in libasound2t64 libasound2-dev; do
            url=$(get_url "$pkg")
            if [ -z "$url" ] && [ "$pkg" = "libasound2t64" ]; then
              url=$(get_url "libasound2")
            fi
            echo "Downloading $url"
            wget -q "$UBUNTU_PORTS/$url" -P /tmp/debs
          done

          for deb in /tmp/debs/*.deb; do
            [ -f "$deb" ] || continue
            dir=$(mktemp -d)
            dpkg-deb -x "$deb" "$dir"
            sudo cp -r "$dir/usr" "$SYSROOT/"
            rm -rf "$dir"
          done

          # Build portaudio from source — static only, no JACK, ALSA from sysroot
          git clone --depth 1 https://github.com/PortAudio/portaudio.git /tmp/portaudio
          cd /tmp/portaudio
          ./configure --host=aarch64-linux-gnu --prefix=/usr \
            CC=aarch64-linux-gnu-gcc \
            CFLAGS="-I$SYSROOT/usr/include -g -O2" \
            LDFLAGS="-L$SYSROOT/usr/lib/aarch64-linux-gnu" \
            PKG_CONFIG_PATH="$SYSROOT/usr/lib/aarch64-linux-gnu/pkgconfig" \
            --without-jack --with-alsa --disable-shared --enable-static
          make -j$(nproc)
          sudo make install DESTDIR=$SYSROOT

          echo "=== ALSA ==="
          ls -la "$SYSROOT/usr/lib/aarch64-linux-gnu"/libasound.* "$SYSROOT/usr/include/alsa/asoundlib.h" 2>&1
          echo "=== PortAudio ==="
          ls -la "$SYSROOT/usr/lib"/libportaudio.* "$SYSROOT/usr/include/portaudio.h" 2>&1
          echo "=== pkgconfig ==="
          ls "$SYSROOT/usr/lib/pkgconfig/"*.pc 2>&1

      - name: Build
        run: |
          mkdir -p dist
          binary="gotone-linux-${{ matrix.arch }}"
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            export CC=aarch64-linux-gnu-gcc
            export PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu
            export PKG_CONFIG_LIBDIR=/usr/aarch64-linux-gnu/usr/lib/pkgconfig:/usr/aarch64-linux-gnu/usr/lib/aarch64-linux-gnu/pkgconfig
            export CGO_LDFLAGS="-L/usr/aarch64-linux-gnu/usr/lib/aarch64-linux-gnu"
          fi
          CGO_ENABLED=1 GOOS=linux GOARCH=${{ matrix.arch }} \
            go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o "dist/${binary}" .

      - uses: actions/upload-artifact@v4
        with:
          name: gotone-linux-${{ matrix.arch }}
          path: dist/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'

      - name: Install portaudio (vcpkg)
        run: |
          vcpkg install portaudio:x64-windows
        shell: bash

      - name: Build
        run: |
          # Verify vcpkg installed correctly
          ls -la C:/vcpkg/installed/x64-windows/include/portaudio.h
          ls -la C:/vcpkg/installed/x64-windows/lib/portaudio.lib

          # Write pkg-config wrapper to fixed known path
          cat > "C:/vcpkg/pkg-config.bat" << 'BAT'
          @echo off
          if /i "%~1"=="--cflags" (echo -IC:/vcpkg/installed/x64-windows/include & exit /b 0)
          if /i "%~1"=="--libs" (echo -LC:/vcpkg/installed/x64-windows/lib -lportaudio & exit /b 0)
          exit /b 0
          BAT
          echo "=== pkg-config.bat ==="
          cat "C:/vcpkg/pkg-config.bat"

          mkdir -p dist
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 \
            go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o dist/gotone-windows-amd64.exe .
        shell: bash
        env:
          PKG_CONFIG: "C:/vcpkg/pkg-config.bat"

      - uses: actions/upload-artifact@v4
        with:
          name: gotone-windows-amd64
          path: dist/

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Check if pre-release
        id: prerelease
        run: |
          if [[ "${{ github.ref_name }}" == *"-beta"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          files: dist/*
