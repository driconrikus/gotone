name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - arch: arm64
            runs-on: macos-latest
          - arch: amd64
            runs-on: macos-13
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install portaudio
        run: brew install portaudio

      - name: Build
        run: |
          mkdir -p dist
          binary="gotone-darwin-${{ matrix.arch }}"
          CGO_ENABLED=1 GOOS=darwin GOARCH=${{ matrix.arch }} \
            go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o "dist/${binary}" .
        env:
          PKG_CONFIG_PATH: ${{ matrix.arch == 'arm64' && '/opt/homebrew/lib/pkgconfig' || '/usr/local/lib/pkgconfig' }}

      - uses: actions/upload-artifact@v4
        with:
          name: gotone-darwin-${{ matrix.arch }}
          path: dist/

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install portaudio
        run: sudo apt-get update && sudo apt-get install -y portaudio19-dev gcc-aarch64-linux-gnu

      - name: Install arm64 cross dependencies
        if: matrix.arch == 'arm64'
        run: |
          SYSROOT=/usr/aarch64-linux-gnu
          sudo mkdir -p "$SYSROOT"
          cd /tmp
          # Download and parse arm64 ALSA version from archive.ubuntu.com
          wget -q "http://archive.ubuntu.com/ubuntu/dists/noble/main/binary-arm64/Packages.gz" \
            -O /tmp/Packages-arm64.gz
          ALSA_VER=$(gzip -dc /tmp/Packages-arm64.gz 2>/dev/null \
            | sed -n '/^Package: libasound2$/,/^$/p' \
            | grep '^Version:' | sed 's/^Version: //')
          echo "ALSA arm64 version: '$ALSA_VER'"
          if [ -z "$ALSA_VER" ]; then
            echo "Failed to detect ALSA version, hardcoding"
            ALSA_VER="1.2.11-1build2"
          fi
          for pkg in libasound2 libasound2-dev; do
            url="http://archive.ubuntu.com/ubuntu/pool/main/a/alsa-lib/${pkg}_${ALSA_VER}_arm64.deb"
            echo "Downloading $url"
            wget -q "$url" || { echo "Failed: $url"; exit 1; }
          done
          for deb in /tmp/libasound2*.deb; do
            if [ -f "$deb" ]; then
              dir=$(mktemp -d)
              dpkg-deb -x "$deb" "$dir"
              sudo cp -r "$dir/usr" "$SYSROOT/"
              rm -rf "$dir"
            fi
          done
          git clone --depth 1 https://github.com/PortAudio/portaudio.git /tmp/portaudio
          cd /tmp/portaudio
          sudo ./configure --host=aarch64-linux-gnu --prefix="$SYSROOT/usr" \
            CC=aarch64-linux-gnu-gcc
          sudo make -j$(nproc)
          sudo make install

      - name: Build
        run: |
          mkdir -p dist
          binary="gotone-linux-${{ matrix.arch }}"
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            export CC=aarch64-linux-gnu-gcc
            export PKG_CONFIG_PATH=/usr/aarch64-linux-gnu/usr/lib/pkgconfig
          fi
          CGO_ENABLED=1 GOOS=linux GOARCH=${{ matrix.arch }} \
            go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o "dist/${binary}" .

      - uses: actions/upload-artifact@v4
        with:
          name: gotone-linux-${{ matrix.arch }}
          path: dist/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install portaudio (vcpkg)
        run: |
          vcpkg install portaudio:x64-windows
        shell: bash

      - name: Build
        run: |
          mkdir -p dist
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 \
            CGO_CFLAGS="-I${VCPKG_ROOT}/installed/x64-windows/include" \
            CGO_LDFLAGS="-L${VCPKG_ROOT}/installed/x64-windows/lib" \
            go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o "dist/gotone-windows-amd64.exe" .
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: gotone-windows-amd64
          path: dist/

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Check if pre-release
        id: prerelease
        run: |
          if [[ "${{ github.ref_name }}" == *"-beta"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          files: dist/*
