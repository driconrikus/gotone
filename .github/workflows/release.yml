name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - arch: arm64
            runs-on: macos-latest
          - arch: amd64
            runs-on: macos-13
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install portaudio
        run: brew install portaudio

      - name: Build
        run: |
          mkdir -p dist
          binary="gotone-darwin-${{ matrix.arch }}"
          CGO_ENABLED=1 GOOS=darwin GOARCH=${{ matrix.arch }} \
            go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o "dist/${binary}" .
        env:
          PKG_CONFIG_PATH: ${{ matrix.arch == 'arm64' && '/opt/homebrew/lib/pkgconfig' || '/usr/local/lib/pkgconfig' }}

      - uses: actions/upload-artifact@v4
        with:
          name: gotone-darwin-${{ matrix.arch }}
          path: dist/

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install portaudio
        run: sudo apt-get update && sudo apt-get install -y portaudio19-dev

      - name: Install arm64 cross dependencies
        if: matrix.arch == 'arm64'
        run: |
          sudo dpkg --add-architecture arm64
          # Restrict existing apt sources to amd64 only (security.ubuntu.com doesn't serve arm64)
          sudo sed -i 's/^deb /deb [arch=amd64] /g' /etc/apt/sources.list
          sudo sed -i 's/^deb /deb [arch=amd64] /g' /etc/apt/sources.list.d/*.list 2>/dev/null || true
          # Add archive.ubuntu.com for arm64 packages
          echo "deb [arch=arm64] http://archive.ubuntu.com/ubuntu noble main universe" | sudo tee /etc/apt/sources.list.d/arm64.list
          sudo apt-get update
          sudo apt-get install -y libasound2-dev:arm64
          git clone --depth 1 https://github.com/PortAudio/portaudio.git /tmp/portaudio
          cd /tmp/portaudio
          sudo ./configure --host=aarch64-linux-gnu --prefix=/usr/aarch64-linux-gnu
          sudo make -j$(nproc)
          sudo make install

      - name: Build
        run: |
          mkdir -p dist
          binary="gotone-linux-${{ matrix.arch }}"
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            export CC=aarch64-linux-gnu-gcc
            export PKG_CONFIG_PATH=/usr/aarch64-linux-gnu/lib/pkgconfig
          fi
          CGO_ENABLED=1 GOOS=linux GOARCH=${{ matrix.arch }} \
            go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o "dist/${binary}" .

      - uses: actions/upload-artifact@v4
        with:
          name: gotone-linux-${{ matrix.arch }}
          path: dist/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install portaudio (vcpkg)
        run: |
          vcpkg install portaudio:x64-windows
        shell: bash

      - name: Build
        run: |
          mkdir -p dist
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 \
            CGO_CFLAGS="-I${VCPKG_ROOT}/installed/x64-windows/include" \
            CGO_LDFLAGS="-L${VCPKG_ROOT}/installed/x64-windows/lib" \
            go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o "dist/gotone-windows-amd64.exe" .
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: gotone-windows-amd64
          path: dist/

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Check if pre-release
        id: prerelease
        run: |
          if [[ "${{ github.ref_name }}" == *"-beta"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          files: dist/*
