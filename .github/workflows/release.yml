name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      matrix:
        arch: [arm64, amd64]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'

      - name: Install portaudio (native)
        if: matrix.arch == 'arm64'
        run: brew install portaudio

      - name: Build portaudio (x86_64 cross)
        if: matrix.arch == 'amd64'
        run: |
          git clone --depth 1 https://github.com/PortAudio/portaudio.git /tmp/portaudio
          cd /tmp/portaudio
          mkdir -p /tmp/portaudio-x86_64
          ./configure --host=x86_64-apple-darwin \
            CC="cc -arch x86_64" \
            CFLAGS="-arch x86_64" \
            LDFLAGS="-arch x86_64" \
            --prefix=/tmp/portaudio-x86_64
          make -j$(nproc)
          make install

      - name: Build
        run: |
          mkdir -p dist
          binary="gotone-darwin-${{ matrix.arch }}"
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            export PKG_CONFIG_PATH=/tmp/portaudio-x86_64/lib/pkgconfig
            export CC="cc -arch x86_64"
          else
            export PKG_CONFIG_PATH=/opt/homebrew/lib/pkgconfig
          fi
          CGO_ENABLED=1 GOOS=darwin GOARCH=${{ matrix.arch }} \
            go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o "dist/${binary}" .

      - uses: actions/upload-artifact@v4
        with:
          name: gotone-darwin-${{ matrix.arch }}
          path: dist/

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'

      - name: Install portaudio
        run: sudo apt-get update && sudo apt-get install -y portaudio19-dev gcc-aarch64-linux-gnu

      - name: Install arm64 cross dependencies
        if: matrix.arch == 'arm64'
        run: |
          SYSROOT=/usr/aarch64-linux-gnu
          sudo mkdir -p "$SYSROOT"
          cd /tmp

          # Add arm64 architecture and Ubuntu ports repo.
          # Pin existing sources to amd64 so they don't try fetching arm64 (404).
          codename=$(grep UBUNTU_CODENAME /etc/os-release | cut -d= -f2)
          sudo find /etc/apt -name '*.list' -exec sed -i 's/^deb /deb [arch=amd64] /' {} \;
          sudo find /etc/apt -name '*.sources' -exec sed -i '/^Components:/a Architectures: amd64' {} \; 2>/dev/null || true
          sudo dpkg --add-architecture arm64
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $codename main universe multiverse restricted" | sudo tee /etc/apt/sources.list.d/arm64.list > /dev/null
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $codename-updates main universe multiverse restricted" | sudo tee -a /etc/apt/sources.list.d/arm64.list > /dev/null
          sudo apt-get update -qq

          # Download arm64 debs (matching runner's Ubuntu release)
          alib="libasound2t64:arm64 libasound2-dev:arm64"
          apt-get download -qq $alib 2>/dev/null || \
            apt-get download -qq libasound2:arm64 libasound2-dev:arm64
          apt-get download -qq libjack-jackd2-0:arm64 libjack-jackd2-dev:arm64 \
            portaudio19-dev:arm64 libportaudio2:arm64

          # Extract into sysroot
          for deb in /tmp/*.deb; do
            [ -f "$deb" ] || continue
            dir=$(mktemp -d)
            dpkg-deb -x "$deb" "$dir"
            sudo cp -r "$dir/usr" "$SYSROOT/"
            rm -rf "$dir"
          done

          # portaudio .pc doesn't require jack, but static lib has JACK symbols
          # Patch it so pkg-config pulls in -ljack for static linking
          pc="$SYSROOT/usr/lib/aarch64-linux-gnu/pkgconfig/portaudio-2.0.pc"
          if grep -q '^Requires:' "$pc" 2>/dev/null; then
            sudo sed -i 's/^Requires: \(.*\)/Requires: \1 jack/' "$pc"
          else
            echo 'Requires: jack' | sudo tee -a "$pc"
          fi

          # Verify ARM64 libs exist
          echo "=== ALSA ==="
          ls -la "$SYSROOT/usr/lib/aarch64-linux-gnu"/libasound.* "$SYSROOT/usr/include/alsa/asoundlib.h" 2>&1
          echo "=== JACK ==="
          ls -la "$SYSROOT/usr/lib/aarch64-linux-gnu"/libjack.* "$SYSROOT/usr/include/jack/jack.h" 2>&1
          echo "=== PortAudio ==="
          ls -la "$SYSROOT/usr/lib/aarch64-linux-gnu"/libportaudio.* "$SYSROOT/usr/include/portaudio.h" 2>&1
          echo "=== pkgconfig ==="
          ls "$SYSROOT/usr/lib/aarch64-linux-gnu/pkgconfig/"*.pc 2>&1
          ls "$SYSROOT/usr/lib/pkgconfig/"*.pc 2>&1

      - name: Build
        run: |
          mkdir -p dist
          binary="gotone-linux-${{ matrix.arch }}"
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            export CC=aarch64-linux-gnu-gcc
            export PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu
            export PKG_CONFIG_LIBDIR=/usr/aarch64-linux-gnu/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/aarch64-linux-gnu/usr/lib/pkgconfig
          fi
          CGO_ENABLED=1 GOOS=linux GOARCH=${{ matrix.arch }} \
            go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o "dist/${binary}" .

      - uses: actions/upload-artifact@v4
        with:
          name: gotone-linux-${{ matrix.arch }}
          path: dist/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'

      - name: Install portaudio (vcpkg)
        run: |
          vcpkg install portaudio:x64-windows
        shell: bash

      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: windows
          GOARCH: amd64
          CGO_CFLAGS: "-IC:/vcpkg/installed/x64-windows/include"
          CGO_LDFLAGS: "-LC:/vcpkg/installed/x64-windows/lib"
        run: |
          # Create pkg-config wrapper and prepend to PATH
          mkdir -p "$HOME/.local/bin"
          cat > "$HOME/.local/bin/pkg-config.bat" << 'EOF'
          @echo off
          if /i "%1"=="--cflags" ( echo -IC:/vcpkg/installed/x64-windows/include & exit /b 0 )
          if /i "%1"=="--libs" ( echo -LC:/vcpkg/installed/x64-windows/lib -lportaudio & exit /b 0 )
          exit /b 0
          EOF
          export PATH="$HOME/.local/bin:$PATH"
          mkdir -p dist
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o dist/gotone-windows-amd64.exe .
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: gotone-windows-amd64
          path: dist/

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Check if pre-release
        id: prerelease
        run: |
          if [[ "${{ github.ref_name }}" == *"-beta"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          files: dist/*
