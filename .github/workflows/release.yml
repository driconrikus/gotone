name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      matrix:
        arch: [arm64, amd64]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install portaudio (native)
        if: matrix.arch == 'arm64'
        run: brew install portaudio

      - name: Build portaudio (x86_64 cross)
        if: matrix.arch == 'amd64'
        run: |
          git clone --depth 1 https://github.com/PortAudio/portaudio.git /tmp/portaudio
          cd /tmp/portaudio
          mkdir -p /tmp/portaudio-x86_64
          ./configure --host=x86_64-apple-darwin \
            CC="cc -arch x86_64" \
            CFLAGS="-arch x86_64" \
            LDFLAGS="-arch x86_64" \
            --prefix=/tmp/portaudio-x86_64
          make -j$(nproc)
          make install

      - name: Build
        run: |
          mkdir -p dist
          binary="gotone-darwin-${{ matrix.arch }}"
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            export PKG_CONFIG_PATH=/tmp/portaudio-x86_64/lib/pkgconfig
            export CC="cc -arch x86_64"
          else
            export PKG_CONFIG_PATH=/opt/homebrew/lib/pkgconfig
          fi
          CGO_ENABLED=1 GOOS=darwin GOARCH=${{ matrix.arch }} \
            go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o "dist/${binary}" .

      - uses: actions/upload-artifact@v4
        with:
          name: gotone-darwin-${{ matrix.arch }}
          path: dist/

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install portaudio
        run: sudo apt-get update && sudo apt-get install -y portaudio19-dev gcc-aarch64-linux-gnu

      - name: Install arm64 cross dependencies
        if: matrix.arch == 'arm64'
        run: |
          SYSROOT=/usr/aarch64-linux-gnu
          sudo mkdir -p "$SYSROOT"
          cd /tmp
          # Download and parse arm64 ALSA version from archive.ubuntu.com
          UBUNTU_PORTS="https://us.ports.ubuntu.com/ubuntu-ports"
          ALSA_VER="1.2.15.3-1ubuntu1.1"
          echo "ALSA arm64 version: '$ALSA_VER'"
          for pkg in libasound2t64 libasound2-dev; do
            url="$UBUNTU_PORTS/pool/main/a/alsa-lib/${pkg}_${ALSA_VER}_arm64.deb"
            echo "Downloading $url"
            wget -q "$url" || { echo "Failed: $url"; exit 1; }
          done
          for deb in /tmp/libasound2*.deb; do
            if [ -f "$deb" ]; then
              dir=$(mktemp -d)
              dpkg-deb -x "$deb" "$dir"
              sudo cp -r "$dir/usr" "$SYSROOT/"
              rm -rf "$dir"
            fi
          done
          git clone --depth 1 https://github.com/PortAudio/portaudio.git /tmp/portaudio
          cd /tmp/portaudio
          sudo ./configure --host=aarch64-linux-gnu --prefix="$SYSROOT/usr" \
            CC=aarch64-linux-gnu-gcc
          sudo make -j$(nproc)
          sudo make install

      - name: Build
        run: |
          mkdir -p dist
          binary="gotone-linux-${{ matrix.arch }}"
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            export CC=aarch64-linux-gnu-gcc
            export PKG_CONFIG_PATH=/usr/aarch64-linux-gnu/usr/lib/pkgconfig
          fi
          CGO_ENABLED=1 GOOS=linux GOARCH=${{ matrix.arch }} \
            go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o "dist/${binary}" .

      - uses: actions/upload-artifact@v4
        with:
          name: gotone-linux-${{ matrix.arch }}
          path: dist/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install portaudio (vcpkg)
        run: |
          vcpkg install portaudio:x64-windows
        shell: bash

      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: windows
          GOARCH: amd64
          CGO_CFLAGS: "-IC:/vcpkg/installed/x64-windows/include"
          CGO_LDFLAGS: "-LC:/vcpkg/installed/x64-windows/lib"
        run: |
          # Create pkg-config wrapper and prepend to PATH
          mkdir -p "$HOME/.local/bin"
          cat > "$HOME/.local/bin/pkg-config.bat" << 'EOF'
          @echo off
          if /i "%1"=="--cflags" ( echo -IC:/vcpkg/installed/x64-windows/include & exit /b 0 )
          if /i "%1"=="--libs" ( echo -LC:/vcpkg/installed/x64-windows/lib -lportaudio & exit /b 0 )
          exit /b 0
          EOF
          export PATH="$HOME/.local/bin:$PATH"
          mkdir -p dist
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o dist/gotone-windows-amd64.exe .
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: gotone-windows-amd64
          path: dist/

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Check if pre-release
        id: prerelease
        run: |
          if [[ "${{ github.ref_name }}" == *"-beta"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          files: dist/*
