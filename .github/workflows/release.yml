name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, amd64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: |
          mkdir -p dist
          binary="gotone-darwin-${{ matrix.arch }}"
          CC=$(if [ "${{ matrix.arch }}" = "arm64" ]; then echo "cc"; else echo "cc -arch x86_64"; fi)
          CGO_ENABLED=1 GOOS=darwin GOARCH=${{ matrix.arch }} CC="$CC" \
            go build -ldflags="-s -w" -o "dist/${binary}" .

      - uses: actions/upload-artifact@v4
        with:
          name: gotone-darwin-${{ matrix.arch }}
          path: dist/

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install portaudio
        run: sudo apt-get update && sudo apt-get install -y portaudio19-dev

      - name: Build
        run: |
          mkdir -p dist
          binary="gotone-linux-${{ matrix.arch }}"
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            export CC=aarch64-linux-gnu-gcc
          fi
          CGO_ENABLED=1 GOOS=linux GOARCH=${{ matrix.arch }} \
            go build -ldflags="-s -w" -o "dist/${binary}" .

      - uses: actions/upload-artifact@v4
        with:
          name: gotone-linux-${{ matrix.arch }}
          path: dist/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install portaudio (vcpkg)
        run: |
          vcpkg install portaudio:x64-windows
        shell: bash

      - name: Build
        run: |
          mkdir -p dist
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 \
            CGO_CFLAGS="-I${VCPKG_ROOT}/installed/x64-windows/include" \
            CGO_LDFLAGS="-L${VCPKG_ROOT}/installed/x64-windows/lib" \
            go build -ldflags="-s -w" -o "dist/gotone-windows-amd64.exe" .
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: gotone-windows-amd64
          path: dist/

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Check if pre-release
        id: prerelease
        run: |
          if [[ "${{ github.ref_name }}" == *"-beta"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          files: dist/*
